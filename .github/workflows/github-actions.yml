name: assignment-test
on:
    push:
        tags-ignore:
            - '*'
        branches:
            - '*'
jobs:
    full-test:
        runs-on: self-hosted
        timeout-minutes: 120
        steps:
          - uses: actions/checkout@v2
          - name: Checkout submodules
            run: git submodule update --init --recursive
          - name: Run full test in autotest container
            shell: bash
            env:
              SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
              GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=no"
            run: |
              set -euo pipefail
              docker run --rm \
                -v "${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}" \
                -w "${GITHUB_WORKSPACE}" \
                -e SSH_PRIVATE_KEY \
                -e GIT_SSH_COMMAND \
                cuaesd/aesd-autotest:24-assignment4-buildroot \
                ./full-test.sh
