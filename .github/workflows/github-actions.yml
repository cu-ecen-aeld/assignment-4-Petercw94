name: assignment-test
on:
    push:
        tags-ignore:
            - '*'
        branches:
            - '*'
jobs:
    full-test:
        container: cuaesd/aesd-autotest:24-assignment4-buildroot
        runs-on: self-hosted
        timeout-minutes: 120
        steps:
          - uses: actions/checkout@v2
          - name: Checkout submodules
            run: git submodule update --init --recursive
          - uses: webfactory/ssh-agent@v0.5.3
            with:
                ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          - name: Run full test
            env:
              GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=no"
            run: |
              set -euo pipefail
              timeout 50m ./full-test.sh || {
                rc=$?
                echo "full-test.sh exited with ${rc}"
                echo "===== diagnostics: socket listeners ====="
                ss -ltnp || true
                echo "===== diagnostics: qemu/ssh processes ====="
                ps -ef | grep -E "qemu-system-aarch64|dropbear|sshpass|ssh " | grep -v grep || true
                echo "===== diagnostics: localhost:10022 probe ====="
                (timeout 3 bash -c 'cat < /dev/tcp/127.0.0.1/10022' >/tmp/port10022.banner 2>/tmp/port10022.err && echo "banner read succeeded") || true
                cat /tmp/port10022.err || true
                cat /tmp/port10022.banner || true
                echo "===== diagnostics: tail test log ====="
                if [ -f test.sh.log ]; then tail -n 120 test.sh.log; fi
                exit ${rc}
              }
          - name: Cleanup
            if: always()
            run: |
              ssh-add -D
